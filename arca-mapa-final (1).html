<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #F7F1E8;
    --dark:   #1C0D06;
    --text:   #2A1505;
    --muted:  #6B4A30;
    --border: #D4B898;
    --red:    #C0392B;
    --red-dk: #7B241C;
    --green:  #1D6B50;
    --f-disp: 'Cormorant Garamond', serif;
    --f-body: 'DM Sans', sans-serif;
  }

  html, body { height: 100%; font-family: var(--f-body); background: var(--bg); }

  /* ── HEADER ── */
  .map-header {
    background: var(--dark);
    padding: .9rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem;
  }
  .map-logo {
    font-family: var(--f-disp); font-size: 1.3rem; font-weight: 600; color: #F5EDD5;
    letter-spacing: .02em;
  }
  .map-logo em { font-style: italic; color: #D4A86A; }
  .map-stats {
    display: flex; gap: 1.25rem;
  }
  .mstat { text-align: center; }
  .mstat-n { font-family: var(--f-disp); font-size: 1.2rem; font-weight: 400; color: #F5EDD5; line-height: 1; }
  .mstat-l { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(245,237,213,.38); margin-top: 1px; }

  /* ── MAP ── */
  #map {
    width: 100%;
    height: calc(100vh - 108px);
    min-height: 400px;
  }

  /* ── FOOTER ── */
  .map-footer {
    background: var(--dark); border-top: 1px solid rgba(255,255,255,.06);
    padding: .55rem 1.25rem;
    display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
  }
  .leg { display: flex; align-items: center; gap: .45rem; }
  .leg-pin {
    width: 12px; height: 16px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg); flex-shrink: 0;
  }
  .leg-pin.red    { background: var(--red); }
  .leg-pin.gold   { background: #D4A86A; }
  .leg-pin.green  { background: var(--green); }
  .leg-lbl { font-size: .65rem; letter-spacing: .08em; text-transform: uppercase; color: rgba(245,237,213,.4); }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    border-radius: 3px !important;
    border: 1px solid var(--border) !important;
    box-shadow: 0 6px 24px rgba(28,13,6,.18) !important;
    padding: 0 !important;
    overflow: hidden;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip-container { margin-top: -1px; }

  .popup-inner { font-family: var(--f-body); padding: 8px 12px; }
  .popup-name {
    font-family: var(--f-disp); font-size: .95rem; font-weight: 600;
    color: var(--text); line-height: 1.25; margin-bottom: 2px;
  }
  .popup-loc { font-size: .7rem; color: var(--muted); }
</style>
</head>

// ── PIN COLORS ──
const pinColor = { founder: '#1D6B50', leader: '#D4A86A', member: '#C0392B' };
const pinBorder = { founder: '#0D3D2C', leader: '#8B6914', member: '#7B241C' };

// ── MAP INIT — using ESRI tiles (no referer restriction) ──
const map = L.map('map', {
  scrollWheelZoom: true,
  zoomControl: true,
  tap: true,
  fullscreenControl: true,
  fullscreenControlOptions: { position: 'topleft', title: 'Full screen', titleCancel: 'Exit full screen' }
}).setView([-10, -68], 3);

// ESRI World Street Map — works without referer restrictions
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles © Esri',
  maxZoom: 19
}).addTo(map);

// ── CUSTOM PIN ICON ──
function makeIcon(role) {
  const c = pinColor[role];
  const b = pinBorder[role];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="20" viewBox="0 0 28 40">
    <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 26 14 26S28 23.333 28 14C28 6.268 21.732 0 14 0z"
      fill="${c}" stroke="${b}" stroke-width="2"/>
    <circle cx="14" cy="14" r="5" fill="white" opacity="0.85"/>
  </svg>`;
  return L.divIcon({
    className: '',
    html: svg,
    iconSize: [14, 20],
    iconAnchor: [7, 20],
    popupAnchor: [0, -22]
  });
}

// ── PLACE MARKERS ──
camps.forEach(c => {
  const icon = makeIcon(c.role);

  const roleLabel = c.role === 'founder' ? 'ARCA Founder'
                  : c.role === 'leader'  ? 'Country Leader'
                  : 'Member';

  const popup = `
    <div class="popup-inner">
      <div class="popup-name">${c.name}</div>
      <div class="popup-loc">${c.country}${c.city ? ' · ' + c.city : ''}</div>
    </div>`;

  L.marker([c.lat, c.lon], { icon }).addTo(map).bindPopup(popup, { maxWidth: 280 });
});

// ── RESPONSIVE: fit map on resize ──
window.addEventListener('resize', () => map.invalidateSize());
